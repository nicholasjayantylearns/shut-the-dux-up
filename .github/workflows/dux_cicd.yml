name: DUX Object Model CI/CD

on:
  push:
    paths:
      - 'docs/100_START_HERE/dux_object_model_guide_v_9_5.md'
      - 'src/dux_v9.5_split_schema/*.json'
  pull_request:
    paths:
      - 'docs/100_START_HERE/dux_object_model_guide_v_9_5.md'
      - 'src/dux_v9.5_split_schema/*.json'
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install watchdog
        pip install jsonschema
        pip install behave
    
    - name: 📋 Validate object model guide
      run: |
        echo "Validating DUX Object Model Guide..."
        if [ ! -f "docs/100_START_HERE/dux_object_model_guide_v_9_5.md" ]; then
          echo "❌ Guide file not found"
          exit 1
        fi
        echo "✅ Guide file exists"
    
    - name: 🔧 Validate JSON schemas
      run: |
        echo "Validating JSON schemas..."
        for file in src/dux_v9.5_split_schema/*.json; do
          echo "Checking $file"
          python -m json.tool "$file" > /dev/null || {
            echo "❌ Invalid JSON: $file"
            exit 1
          }
        done
        echo "✅ All schemas valid"
    
    - name: 📝 Generate prompts
      run: |
        echo "Regenerating prompt templates..."
        python scripts/update_prompts_with_schema.py
        python scripts/generate_notebooklm_prompts.py
        echo "✅ Prompts generated"
    
    - name: 🧪 Run schema validation tests
      run: |
        echo "Running BDD schema validation tests..."
        behave features/dux_schema_validation.feature -f plain
        echo "✅ All tests passed"
    
    - name: 📊 Generate version info
      run: |
        echo "Generating version information..."
        timestamp=$(date +"%Y%m%d_%H%M%S")
        cat > version_info.json << EOF
        {
          "timestamp": "$timestamp",
          "pipeline_version": "1.0.0",
          "guide_version": "9.5",
          "git_sha": "${{ github.sha }}",
          "git_ref": "${{ github.ref }}",
          "artifacts_generated": true,
          "ci_platform": "github_actions"
        }
        EOF
        echo "✅ Version info generated"
    
    - name: 📦 Create artifacts
      run: |
        echo "Creating distribution artifacts..."
        mkdir -p dist
        timestamp=$(date +"%Y%m%d_%H%M%S")
        
        # Package schemas
        tar -czf "dist/dux_v9.5_schemas_${timestamp}.tar.gz" -C src dux_v9.5_split_schema/
        
        # Package prompts
        tar -czf "dist/dux_v9.5_prompts_${timestamp}.tar.gz" -C scripts prompts_from_markdown/ prompts_notebooklm/ prompts_hybrid/
        
        # Package docs
        tar -czf "dist/dux_v9.5_docs_${timestamp}.tar.gz" docs/
        
        echo "✅ Artifacts created:"
        ls -la dist/
    
    - name: 📤 Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dux-v9.5-artifacts-${{ github.run_number }}
        path: |
          dist/*.tar.gz
          version_info.json
        retention-days: 30
    
    - name: 🏷️ Create release (on main branch)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v9.5-${{ github.run_number }}
        release_name: DUX v9.5 Auto-Release ${{ github.run_number }}
        body: |
          🤖 Automated release of DUX Object Model v9.5
          
          **Changes:**
          - Object model guide updated
          - Schemas validated and regenerated
          - All prompt templates updated
          - Tests passed
          
          **Artifacts:**
          - Schemas package
          - Prompts package
          - Documentation package
          
          **Generated:** ${{ github.sha }}
        draft: false
        prerelease: false

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: validate-and-build
    if: failure()
    
    steps:
    - name: 🚨 Notification on failure
      run: |
        echo "❌ DUX CI/CD Pipeline failed!"
        echo "Check the workflow logs for details."
        # Could integrate with Slack, Discord, etc. here
